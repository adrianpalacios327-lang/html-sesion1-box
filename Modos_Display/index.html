<!DOCTYPE html>
<html lang="en">
<head>
 <style>
    .elemento{
        display: inline;
        background-color: black;
        color: white;
        width: 200px;
    }
    .elemento_block{
        display: block;
        background-color: rgb(8, 31, 42);
        color: rgb(156, 46, 46);
        width: 200px;
        height: 200px;
    }
    
    .resaltado{
        color: aqua;
        letter-spacing: 2px;
        font-size: large;
        font-weight:bold;
    }
 </style>
</head>
<body>
    <h1>Inline</h1>
        <div class="elemento resaltado">
        productos
    </div>
   <div class="elemento">
        servivios
    </div>
    <div class="elemento resaltado">
        contacto
    </div>
    <hr/>

    <h1>Block</h1>
           <div class="elemento_block">
        productos
    </div>
   <div class="elemento_block">
        servivios
    </div>
    <div class="elemento_block">
        contacto
    </div>
    <hr/>

</body>
</html>
